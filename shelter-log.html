<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HSMS — Check-In / Check-Out</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="hsms-app">
  <aside class="hsms-sidebar" id="hsms-sidebar"></aside>
  <div class="hsms-main">
    <header class="hsms-topbar" id="hsms-topbar"></header>
    <main class="hsms-content">

      <h2>Shelter Check-In / Check-Out</h2>
      <p style="color:var(--text-muted); margin-top:-8px;">Search by tracking ID or name to admit or discharge a person.</p>

      <div class="card">
        <div class="toolbar">
          <input type="text" id="logSearch" placeholder="Search tracking ID or name..." style="flex:1; min-width:220px;" />
          <button class="btn btn-outline btn-sm" id="logSearchBtn">Search</button>
        </div>
        <div id="logSearchResults"></div>
      </div>

      <div class="card" id="actionCard" style="display:none;">
        <h3 id="actionTitle">Selected Person</h3>
        <div class="grid-2">
          <div>
            <h4>Check-In</h4>
            <div class="field"><label>Shelter</label><select id="ci_shelter"></select></div>
            <div class="field"><label>Bed Number</label><input type="text" id="ci_bed" /></div>
            <div class="field"><label>Remarks</label><textarea id="ci_remarks" rows="2"></textarea></div>
            <button class="btn btn-navy" id="checkInBtn">Check In</button>
          </div>
          <div>
            <h4>Check-Out</h4>
            <div class="field"><label>Reason</label>
              <select id="co_reason">
                <option value="voluntary">Voluntary departure</option>
                <option value="referred">Referred elsewhere</option>
                <option value="reunited">Reunited with family</option>
                <option value="missing">Missing during stay</option>
                <option value="deceased">Deceased</option>
              </select>
            </div>
            <div class="field"><label>Remarks</label><textarea id="co_remarks" rows="2"></textarea></div>
            <button class="btn btn-orange" id="checkOutBtn">Check Out</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Live Shelter Roster</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Tracking ID</th><th>Name</th><th>Shelter</th><th>Bed</th><th>Checked In</th></tr></thead>
            <tbody id="rosterBody"><tr><td colspan="5">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/shelter.js"></script>
</body>
</html>
